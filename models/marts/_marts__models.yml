version: 2

models:


  # DIMENSIONES


  - name: dim_customers
    description: >
      Dimensión de clientes de Naranja X enriquecida con datos del buró de crédito.
      Grano: 1 fila por cliente.
      Incluye segmentación demográfica, banda de ingresos y perfil de riesgo del buró.
      Hereda informacion de snapshot del buró.
    columns:
      - name: customer_sk
        description: "Surrogate key MD5 sobre customer_id. Usada para joins downstream con facts."
        tests:
          - unique
          - not_null

      - name: customer_id
        description: "Identificador único del cliente. Clave primaria."
        tests:
          - unique
          - not_null

      - name: age_group
        description: "Banda etaria del cliente: 18-24, 25-34, 35-44, 45-54, 55+."
        tests:
          - accepted_values:
              arguments:
                values: ['18-24', '25-34', '35-44', '45-54', '55+']

      - name: income_tier
        description: "Segmentación por nivel de ingresos: LOW, MID, HIGH, PREMIUM."
        tests:
          - accepted_values:
              arguments:
                values: ['LOW', 'MID', 'HIGH', 'PREMIUM']

      - name: customer_segment
        description: "Segmento comercial de Naranja X: A (premium) a D (subprime)."
        tests:
          - not_null

      - name: bureau_score
        description: "Score crediticio del buró externo. Rango 300-950. Nulo si el cliente es credit invisible."

      - name: debt_to_annual_income_ratio
        description: "Ratio deuda sobre ingreso anual (DTI). Métrica clave de riesgo crediticio."


  - name: dim_products
    description: >
      Dimensión de catálogo de productos crediticios.
      Se alimenta del seed catalog_products.
      Grano: 1 fila por código de producto.
    columns:
      - name: product_code
        description: "Identificador del producto: CREDIT_CARD, PERSONAL_LOAN, CREDIT_LINE."
        tests:
          - unique
          - not_null
      - name: risk_tier
        description: "Nivel de riesgo asociado al producto: low, medium, high."
        tests:
          - accepted_values:
              arguments:
                values: ['low', 'medium', 'high']

      
  - name: dim_date
    description: >
      Dimension de fechas conformed a nivel warehouse. Grano: 1 fila por dia
      desde 2020-01-01 hasta 2030-12-31. Incluye feriados nacionales
      argentinos desde el seed holidays_ar y flags de business
      day para calculos de mora habil.
    columns:
      - name: date
        description: "Natural key. Fecha en formato DATE."
        tests:
          - unique
          - not_null
      
      - name: date_sk
        description: "Surrogate key en formato INT YYYYMMDD (ej: 20260718)."
        tests:
          - unique
          - not_null
      
      - name: is_business_day
        description: "True si es dia habil (weekday y no feriado bancario)."
        tests:
          - not_null
      
      - name: is_holiday
        description: "True si es feriado nacional AR."
        tests:
          - not_null



  # FACTS (eventos atómicos)


  - name: fct_applications
    description: >
      Fact table de solicitudes de crédito.
      Grano: 1 fila por solicitud.
      Preserva solicitudes aprobadas, rechazadas Y pendientes para permitir análisis de funnel completo.
    columns:
      - name: application_id
        description: "Identificador de la solicitud. Clave primaria."
        tests:
          - unique
          - not_null

      - name: customer_id
        description: "Clave foránea a dim_customers."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id

      - name: product_code
        description: "Clave foránea a dim_products."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_code

      - name: requested_amount_ars
        description: "Monto solicitado por el cliente en pesos argentinos."

      - name: application_status
        description: "Estado final de la solicitud: approved, rejected o pending."
        tests:
          - accepted_values:
              arguments:
                values: ['approved', 'rejected', 'pending']


  - name: fct_originations
    description: >
      Fact table de créditos otorgados (originaciones efectivas).
      Grano: 1 fila por crédito originado.
      Solo incluye solicitudes que fueron aprobadas Y aceptadas por el cliente.
    columns:
      - name: origination_id
        description: "Identificador de la originación. Clave primaria."
        tests:
          - unique
          - not_null

      - name: customer_id
        description: "Clave foránea a dim_customers."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id

      - name: product_code
        description: "Clave foránea a dim_products."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_code

      - name: approved_amount_ars
        description: "Monto efectivamente otorgado al cliente en pesos argentinos."


  - name: fct_payments
    description: >
      Fact de pagos con materializacion incremental (strategy merge).
      Grano: 1 fila por evento de pago realizado.
      
      Particionado por payment_date con granularity mensual, clusterizado
      por bucket_code, customer_sk y due_date. Incremental usa lookback
      de 3 dias sobre payment_date para capturar late-arrivings por
      conciliacion bancaria.
      
      Para full refresh usar --full-refresh flag.
    columns:
      - name: customer_sk
        description: "Surrogate key del cliente. Se joinea con dim_customers.customer_sk."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_sk

      - name: payment_id
        description: "Identificador del pago. Clave primaria."
        tests:
          - unique
          - not_null

      - name: origination_id
        description: "Clave foránea al crédito al que pertenece este pago."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_originations')
                field: origination_id

      - name: customer_id
        description: "Clave foránea a dim_customers."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id

      - name: days_past_due
        description: "Días de atraso en el pago. 0 = al día, positivo = pago con mora."

      - name: bucket_code
        description: "Bucket de mora: CURRENT, B1_29, B30_59, B60_89, B90_PLUS, DEFAULT."
        tests:
          - accepted_values:
              arguments:
                values: ['CURRENT', 'B1_29', 'B30_59', 'B60_89', 'B90_PLUS', 'DEFAULT']



  # AGGREGATION MARTS (métricas pre-agregadas derivadas)


  - name: agg_customer_360
    description: >
      Mart de agregación con grano = customer_id. Consolida métricas de
      fct_applications, fct_originations y fct_payments en una tabla wide
      centrada en el cliente, usada para segmentación y análisis de riesgo.
      
      Renombrado desde fct_credit_profile — semánticamente es un mart
      derivado pre-agregado, no un fact table Kimball (no tiene grano
      atómico de evento).
      
      Consumidores: dashboard_perfil_crediticio (Power BI).
    columns:
      - name: customer_id
        description: "Natural key. Una fila por cliente."
        tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id

      - name: current_risk_status
        description: >
          Clasificación de riesgo derivada según peor DPD histórico del cliente:
          CURRENT (nunca en mora), LOW_RISK (1-29 dpd), MEDIUM_RISK (30-89),
          HIGH_RISK (90-179), DEFAULT (180+ días), NO_HISTORY (sin pagos aún).
        tests:
          - accepted_values:
              arguments:
                values: ['CURRENT', 'LOW_RISK', 'MEDIUM_RISK', 'HIGH_RISK', 'DEFAULT', 'NO_HISTORY']

      - name: approval_rate
        description: "Solicitudes aprobadas / solicitudes totales. Nulo si el cliente no hizo solicitudes."

      - name: take_rate
        description: "Créditos originados / solicitudes aprobadas. Mide cuántos aprobados se convierten en crédito efectivo."

      - name: is_healthy_active_customer
        description: "Flag ejecutivo. True cuando el cliente tiene créditos originados, ningún pago en mora, y su cuenta está activa."